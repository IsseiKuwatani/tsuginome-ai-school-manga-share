html{scroll-behavior:smooth}

.logo{width:104px;height:auto;display:block}

.stack{display:block;background:#fff}
.section-img{display:block;width:100%;height:auto;margin:0;border:0}
.final-cta{background:linear-gradient(180deg,#fff 0%,#f4f9ff 100%);padding:24px 18px 112px;text-align:center;border-top:1px solid var(--line)}
.final-cta h1{margin:0 0 10px;font-size:24px;line-height:1.35;letter-spacing:-.03em;color:var(--navy)}
.final-cta p{margin:0 auto 16px;max-width:360px;font-size:14px;line-height:1.8;color:#344054}
.gift{display:grid;gap:8px;margin:16px auto 18px;max-width:360px;text-align:left}
.gift div{background:#fff;border:1px solid #dbe7f3;border-radius:14px;padding:11px 12px;font-weight:800;font-size:13px;color:#182230;box-shadow:0 8px 22px rgba(16,24,40,.05)}

.micro{margin-top:12px!important;font-size:11px!important;color:#667085!important}
.sticky-cta{position:fixed;left:50%;bottom:calc(12px + env(safe-area-inset-bottom));transform:translateX(-50%);z-index:30;width:min(430px,calc(100% - 22px));display:flex;align-items:center;justify-content:center;background:var(--green);color:#fff;text-decoration:none;border:2px solid #111827;border-radius:999px;padding:14px 16px;font-weight:950;box-shadow:0 5px 0 #000,0 14px 30px rgba(0,0,0,.24)}
