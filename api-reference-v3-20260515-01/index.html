<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ツギノメAIスクール 漫画LP v3</title>
  <meta name="description" content="ツギノメAIスクール 漫画LP v3" />
  <style>
    :root{--line:#06C755;--ink:#1f2937;--bg:#f5f0e8;}
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif;}
    .wrap{max-width:560px;margin:0 auto;background:#fff;min-height:100vh;box-shadow:0 0 32px rgba(31,41,55,.12)}
    header{position:sticky;top:0;z-index:10;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);border-bottom:1px solid #eee;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:12px}
    .brand{font-weight:700;font-size:14px;letter-spacing:.02em}.btn{display:inline-flex;align-items:center;justify-content:center;background:var(--line);color:#fff;text-decoration:none;font-weight:800;border-radius:999px;padding:10px 14px;font-size:13px;box-shadow:0 6px 16px rgba(6,199,85,.28)}
    main{line-height:0}.page{display:block;width:100%;height:auto;margin:0;padding:0}
    .refs{padding:18px 14px 92px;background:#fafafa;line-height:1.7}.refs h2{font-size:16px;margin:0 0 10px}.refs img{width:100%;height:auto;border:1px solid #eee;border-radius:12px;margin:8px 0 18px}.note{font-size:12px;color:#6b7280;text-align:center;margin-top:8px;line-height:1.5}
    .sticky{position:fixed;left:50%;bottom:14px;transform:translateX(-50%);width:min(528px,calc(100vw - 28px));z-index:20}.sticky .btn{width:100%;font-size:16px;padding:15px 18px}
  </style>
</head>
<body>
  <div class="wrap">
    <header><div class="brand">ツギノメAIスクール 漫画LP v3</div><a class="btn" href="#line">LINE登録</a></header>
    <main>
      <img class="page" src="assets/01.png" alt="漫画LP 01">
      <img class="page" src="assets/02.png" alt="漫画LP 02">
      <img class="page" src="assets/03.png" alt="漫画LP 03">
      <img class="page" src="assets/04.png" alt="漫画LP 04">
      <img class="page" src="assets/05.png" alt="漫画LP 05">
      <img class="page" src="assets/06.png" alt="漫画LP 06">
      <img class="page" src="assets/07.png" alt="漫画LP 07">
      <img class="page" src="assets/08.png" alt="漫画LP 08">
      <img class="page" src="assets/09.png" alt="漫画LP 09">
      <img class="page" src="assets/10.png" alt="漫画LP 10">
      <img class="page" src="assets/11.png" alt="漫画LP 11">
      <img class="page" src="assets/12.png" alt="漫画LP 12">
      <img class="page" src="assets/13.png" alt="漫画LP 13">
      <img class="page" src="assets/14.png" alt="漫画LP 14">
      <img class="page" src="assets/15.png" alt="漫画LP 15">
      <img class="page" src="assets/16.png" alt="漫画LP 16">
      <img class="page" src="assets/17.png" alt="漫画LP 17">
      <img class="page" src="assets/18.png" alt="漫画LP 18">
      <img class="page" src="assets/19.png" alt="漫画LP 19">
      <img class="page" src="assets/20.png" alt="漫画LP 20">
      <section class="refs">
        <h2>QA用コンタクトシート</h2>
        <img src="assets/contact-sheet-01-20.jpg" alt="contact sheet 01-20">
        <img src="assets/contact-sheet-full.jpg" alt="full contact sheet">
        <p class="note">内部画像生成で作成。画像内テキストは生成画像に焼き込み。</p>
      </section>
    </main>
  </div>
  <div class="sticky" id="line"><a class="btn" href="#">LINE登録で無料プレゼントを受け取る</a></div>
</body>
</html>
